# Alembic config for the Claude Hive hub registry.
#
# sqlalchemy.url is deliberately left blank here and overridden at
# runtime by ``hub.db.migrations_runner._alembic_config`` so the live
# hub, tests, and CLI invocations all point Alembic at the same
# file as HiveSettings.db_path.
#
# Invoke manually with:
#
#     cd hub && alembic -c db/alembic.ini -x db_path=/path/to/registry.db \
#         revision --autogenerate -m "describe the change"
#
# or use the hub.db.cli helpers once those land.

[alembic]
# Populated at runtime.
sqlalchemy.url =

# Script location is relative to this ini file.
script_location = migrations

# Revision files are named YYYY_MM_DD_HHMM-<slug>.py. Keeping the
# timestamp prefix makes migration order obvious in `ls`.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(slug)s

# Versioning is the standard single-head linear tree.
timezone = UTC

# We don't use Alembic's autogen env blocks that require editor
# interaction. autogenerate output is committed as-is.
revision_environment = false

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
