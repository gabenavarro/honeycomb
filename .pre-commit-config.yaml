# Pre-commit config for Honeycomb.
#
# Install once:     pre-commit install
# Run on all files: pre-commit run --all-files
#
# CI also runs `pre-commit run --all-files` so local and CI stay in sync.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.patch$|\.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, json, yaml, markdown, html]
        # The tailwindcss plugin is only wired up in dashboard/.prettierrc.json
        # because pre-commit's isolated prettier env cannot resolve plugins
        # that live in dashboard/node_modules/. Files under dashboard/ are
        # still formatted correctly by `npm run format` locally and in CI.
        additional_dependencies: [prettier@3.3.3]
        exclude: |
          (?x)^(
            dashboard/.*
            | .*/node_modules/.*
            | .*/dist/.*
            | .*package-lock\.json
          )$

  - repo: local
    hooks:
      - id: no-anthropic-api-key
        name: refuse ANTHROPIC_API_KEY in shipped files
        description: >
          Honeycomb uses Max-plan subscription auth. Shipping
          ANTHROPIC_API_KEY= in any committed file indicates a
          config mistake that will override the subscription.
        entry: "ANTHROPIC_API_KEY="
        language: pygrep
        types: [text]
        exclude: |
          (?x)^(
            \.env\.example
            | SECURITY\.md
            | CLAUDE\.md
            | README\.md
            | \.pre-commit-config\.yaml
            | hub/services/.*\.py
            | bootstrapper/templates/.*/entrypoint\.sh
          )$
